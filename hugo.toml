baseURL = 'https://yinchengwang.github.io/'
locale = 'zh-cn'
title = 'cyw777的博客'
theme = 'PaperMod'

[pagination]
  pagerSize = 10

[params]
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true

  [params.homeInfoParams]
    Title = 'cyw777的博客'
    Content = '技术 / 思考 / 记录'

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/yinchengwang'

[params.editPost]
  URL = 'https://github.com/yinchengwang/git-blog/tree/main/content'
  Text = '建议修改'
  appendFilePath = true

[outputs]
  home = ['HTML', 'RSS']

[markup]
  [markup.highlight]
    style = 'dracula'
    lineNos = false
    codeFences = true
    guessSyntax = true

[markup.goldmark]
  [markup.goldmark.renderer]
    unsafe = true

[[menu.main]]
  identifier = 'archives'
  name = '归档'
  url = '/archives/'
  weight = 5

[[menu.main]]
  identifier = 'categories'
  name = '分类'
  url = '/categories/'
  weight = 10

[[menu.main]]
  identifier = 'tags'
  name = '标签'
  url = '/tags/'
  weight = 15

[[menu.main]]
  identifier = 'search'
  name = '搜索'
  url = '/search/'
  weight = 20
